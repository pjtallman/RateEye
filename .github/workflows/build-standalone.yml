name: Build Standalone Binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  discussions: write

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        arch: [x64, arm64]
        exclude:
          - os: windows-latest
            arch: arm64 # We'll stick to x64 for Windows for maximum compatibility
        include:
          - os: macos-latest
            arch: x64
            artifact_name: rateeye-macos-intel
            asset_name: rateeye-macos-intel.zip
          - os: macos-latest
            arch: arm64
            artifact_name: rateeye-macos-arm64
            asset_name: rateeye-macos-arm64.zip
          - os: windows-latest
            arch: x64
            artifact_name: rateeye-windows
            asset_name: rateeye-windows.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller uvicorn fastapi sqlalchemy jinja2 passlib bcrypt==3.2.2 python-multipart pyyaml curl-cffi yfinance pandas

      - name: Build Standalone with PyInstaller
        shell: bash
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          # Force PyInstaller to match our Python architecture
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            if [ "${{ matrix.arch }}" == "x64" ]; then
              pyinstaller --clean --target-arch x86_64 rateeye.spec
            else
              pyinstaller --clean --target-arch arm64 rateeye.spec
            fi
          else
            pyinstaller --clean rateeye.spec
          fi

      - name: Package Binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r ../${{ matrix.asset_name }} rateeye ../README.md ../VERSION
          cd ..

      - name: Package Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path rateeye.exe, ../README.md, ../VERSION -DestinationPath ../${{ matrix.asset_name }}
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/rateeye-macos-intel/rateeye-macos-intel.zip
            artifacts/rateeye-macos-arm64/rateeye-macos-arm64.zip
            artifacts/rateeye-windows/rateeye-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

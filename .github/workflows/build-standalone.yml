name: Build Standalone Installers

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  discussions: write

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        arch: [x64, arm64]
        exclude:
          - os: windows-latest
            arch: arm64
        include:
          - os: macos-latest
            arch: x64
            artifact_name: rateeye-macos-intel
            asset_name: rateeye-macos-intel.dmg
          - os: macos-latest
            arch: arm64
            artifact_name: rateeye-macos-arm64
            asset_name: rateeye-macos-arm64.dmg
          - os: windows-latest
            arch: x64
            artifact_name: rateeye-windows-setup
            asset_name: rateeye-windows-setup.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Install Python Dependencies
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" == "x64" ] && [ "${{ matrix.os }}" == "macos-latest" ]; then
            arch -x86_64 python -m pip install --upgrade pip
            arch -x86_64 pip install pyinstaller uvicorn fastapi sqlalchemy jinja2 passlib bcrypt==3.2.2 python-multipart pyyaml curl-cffi yfinance pandas
          else
            python -m pip install --upgrade pip
            pip install pyinstaller uvicorn fastapi sqlalchemy jinja2 passlib bcrypt==3.2.2 python-multipart pyyaml curl-cffi yfinance pandas
          fi

      - name: Build Standalone with PyInstaller
        shell: bash
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          if [ "${{ matrix.arch }}" == "x64" ] && [ "${{ matrix.os }}" == "macos-latest" ]; then
            export PYI_ARCH="x86_64"
            arch -x86_64 pyinstaller --clean rateeye.spec
          elif [ "${{ matrix.arch }}" == "arm64" ] && [ "${{ matrix.os }}" == "macos-latest" ]; then
            export PYI_ARCH="arm64"
            pyinstaller --clean rateeye.spec
          else
            pyinstaller --clean rateeye.spec
          fi

      - name: Create macOS DMG
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dist/dmg_content
          cp dist/rateeye dist/dmg_content/RateEye
          cp INSTALL_GUIDE.txt dist/dmg_content/
          cp COPYRIGHT.txt dist/dmg_content/
          # Create a symbolic link to Applications
          ln -s /Applications dist/dmg_content/Applications
          # Create the DMG
          hdiutil create -volname "RateEye Installer" -srcfolder dist/dmg_content -ov -format UDZO ${{ matrix.asset_name }}

      - name: Create Windows Installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Run Inno Setup Compiler (iscc)
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts/windows_installer.iss
          # The output is in the root because OutputDir=.. in the .iss file
          Move-Item -Path rateeye-windows-setup.exe -Destination ${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/rateeye-macos-intel/rateeye-macos-intel.dmg
            artifacts/rateeye-macos-arm64/rateeye-macos-arm64.dmg
            artifacts/rateeye-windows-setup/rateeye-windows-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

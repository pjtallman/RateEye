{% extends "base.html" %}

{% block title %}Change Your Username{% endblock %}

{% block content %}
    <div class="login-container" style="max-width: 400px; margin: 0 auto;">
        <h1>Change Your Username</h1>
        
        <p>Current Username: <strong>{{ user.username }}</strong></p>

        {% if error %}
        <div style="background-color: #fee; color: #c00; padding: 10px; border-radius: 4px; margin-bottom: 20px; text-align: center; border: 1px solid #fcc;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/settings/user/change-username" method="post">
            <label>New Username:</label>
            <input type="text" name="new_username" required>
            <br><br>
            <button type="submit">Update Username</button>
            <a href="/settings/user" class="btn">Cancel</a>
        </form>
    </div>
{% endblock %}

{% extends "base.html" %}

{% block title %}{{ t.heading_change_your_username }}{% endblock %}

{% block content %}
    <div class="login-container" style="max-width: 400px; margin: 0 auto;">
        <h1>{{ t.heading_change_your_username }}</h1>
        
        <p>{{ t.label_current_username }}: <strong>{{ user.username }}</strong></p>

        {% if error %}
        <div style="background-color: #fee; color: #c00; padding: 10px; border-radius: 4px; margin-bottom: 20px; text-align: center; border: 1px solid #fcc;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/settings/user/change-username" method="post">
            <label>{{ t.label_new_username or 'New Username:' }}</label>
            <input type="text" name="new_username" required>
            <br><br>
            <button type="submit">{{ t.btn_update_username }}</button>
        </form>
    </div>
{% endblock %}

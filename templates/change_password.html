{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
    <div class="login-container" style="max-width: 400px; margin: 0 auto;">
        <h1>Change Password</h1>
        
        <p style="color: #c00; font-weight: bold; margin-bottom: 20px;">
            A password change is required for your account.
        </p>

        {% if error %}
        <div style="background-color: #fee; color: #c00; padding: 10px; border-radius: 4px; margin-bottom: 20px; text-align: center; border: 1px solid #fcc;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/change-password" method="post">
            <label>New Password:</label>
            <input type="password" name="new_password" required minlength="8">
            <br><br>
            <label>Confirm New Password:</label>
            <input type="password" name="confirm_password" required minlength="8">
            <br><br>
            <button type="submit">Update Password</button>
        </form>
    </div>
{% endblock %}

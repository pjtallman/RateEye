<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RateEye - Yield Tracker</title>
    <style>
        body { font-family: sans-serif; margin: 0; }
        .navbar { background: #333; color: white; padding: 10px; display: flex; gap: 20px; }
        .menu-item { cursor: pointer; position: relative; display: inline-block; }
        .dropdown { display: none; position: absolute; background: #f9f9f9; color: black; min-width: 160px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1; }
        .menu-item:hover .dropdown { display: block; }
        .dropdown div { padding: 12px 16px; border-bottom: 1px solid #ddd; }
        .dropdown div:hover { background-color: #f1f1f1; }
        .content { padding: 50px; text-align: center; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="menu-item">File
        <div class="dropdown">
            <div>Add Tickers</div>
            <div>Edit Tickers</div>
        </div>
    </div>
    <div class="menu-item">Edit
        <div class="dropdown">
            <div>Cut</div>
            <div>Copy</div>
            <div>Paste</div>
        </div>
    </div>
    <div class="menu-item">View
        <div class="dropdown">
            <div>Current Rates</div>
        </div>
    </div>
    <div class="menu-item">Help
        <div class="dropdown">
            <div>About</div>
        </div>
    </div>
</div>

<div class="content">
    <h1>Welcome to RateEye</h1>
    <p>Your dashboard for Money Market and Bond Yields.</p>
</div>

</body>
</html>

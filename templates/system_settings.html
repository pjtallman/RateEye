{% extends "base.html" %}

{% block title %}{{ t.item_system_settings }}{% endblock %}

{% block content %}
<style>
    .settings-container {
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
    }
    .settings-section {
        margin-bottom: 40px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fff;
        padding: 20px;
    }
    .settings-section h2 {
        margin-top: 0;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
        font-size: 1.25em;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
    }
    .form-group input, .form-group select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
    .btn-save-settings {
        background-color: #000;
        color: #fff;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
    .btn-test {
        background-color: #28a745;
        color: #fff;
        padding: 8px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 10px;
    }
    #test-result {
        margin-top: 10px;
        font-weight: bold;
    }
    .label-with-help {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .help-icon-btn {
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        color: #6c757d;
    }
    .help-icon-btn:hover {
        color: #007bff;
    }
</style>

<div class="settings-container">
    <h1>{{ t.heading_system_settings }}</h1>
    
    <form action="/settings/system" method="post">
        <!-- Log Settings -->
        <div class="settings-section">
            <h2>Logging</h2>
            <div class="form-group">
                <label for="log_lines">{{ t.label_log_lines }}</label>
                <input type="number" id="log_lines" name="log_lines" value="{{ line_count }}">
            </div>
        </div>

        <!-- Security Data Endpoints -->
        <div class="settings-section">
            <h2>{{ t.heading_security_endpoints }}</h2>
            
            <div class="form-group">
                <label for="security_data_endpoint">{{ t.label_active_endpoint }}</label>
                <select id="security_data_endpoint" name="security_data_endpoint" onchange="toggleApiKey()">
                    <option value="yahoo" {% if active_endpoint == 'yahoo' %}selected{% endif %}>RateEye Standard (Yahoo Scraper)</option>
                    <option value="finnhub" {% if active_endpoint == 'finnhub' %}selected{% endif %}>Finnhub API</option>
                    <option value="alphavantage" {% if active_endpoint == 'alphavantage' %}selected{% endif %}>Alpha Vantage API</option>
                </select>
            </div>

            <div id="api-key-group" class="form-group" style="display: none;">
                <label for="api_key" class="label-with-help">
                    API Key
                    <button type="button" class="help-icon-btn" onclick="showHelp()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    </button>
                </label>
                <input type="text" id="api_key" name="api_key" value="{{ active_key }}" placeholder="Enter API Key">
            </div>

            <button type="button" id="btn-test-endpoint" class="btn-test">{{ t.btn_test_endpoint }}</button>
            <div id="test-result"></div>
        </div>

        <button type="submit" class="btn-save-settings">{{ t.btn_save_settings }}</button>
    </form>
</div>

<!-- Help Modal -->
<div id="help-modal" class="modal-overlay" style="display: none;">
    <div class="modal-container">
        <div class="modal-header" id="help-title">API Key Help</div>
        <div id="help-content" style="padding: 20px; line-height: 1.6;">
            <!-- Content populated by JS -->
        </div>
        <div style="padding: 15px 20px; border-top: 1px solid #eee; text-align: right;">
            <button class="btn-action" onclick="document.getElementById('help-modal').style.display='none'">Close</button>
        </div>
    </div>
</div>

<script>
function toggleApiKey() {
    const endpoint = document.getElementById('security_data_endpoint').value;
    const group = document.getElementById('api-key-group');
    group.style.display = (endpoint === 'yahoo') ? 'none' : 'block';
}

function showHelp() {
    const provider = document.getElementById('security_data_endpoint').value;
    const modal = document.getElementById('help-modal');
    const title = document.getElementById('help-title');
    const content = document.getElementById('help-content');
    
    if (provider === 'finnhub') {
        title.textContent = 'How to get a Finnhub API Key';
        content.innerHTML = `
            <ol>
                <li>Go to <a href="https://finnhub.io/register" target="_blank">finnhub.io/register</a> and create a free account.</li>
                <li>Once logged in, your API key will be displayed on your dashboard.</li>
                <li>Copy the key and paste it into the field on this page.</li>
            </ol>
            <p>Finnhub's free tier allows 60 requests per minute, which is perfect for RateEye.</p>
        `;
    } else if (provider === 'alphavantage') {
        title.textContent = 'How to get an Alpha Vantage API Key';
        content.innerHTML = `
            <ol>
                <li>Go to <a href="https://www.alphavantage.co/support/#api-key" target="_blank">alphavantage.co</a>.</li>
                <li>Fill out the form to request a free API key.</li>
                <li>Your key will be sent to your email or displayed on screen.</li>
                <li>Copy the key and paste it into the field on this page.</li>
            </ol>
            <p>Alpha Vantage's free tier is limited to 25 requests per day.</p>
        `;
    }
    
    modal.style.display = 'flex';
}

document.getElementById('btn-test-endpoint').addEventListener('click', async () => {
    const endpoint = document.getElementById('security_data_endpoint').value;
    const apiKey = document.getElementById('api_key').value;
    const resultDiv = document.getElementById('test-result');
    
    resultDiv.textContent = 'Testing...';
    resultDiv.style.color = '#666';
    
    try {
        const resp = await fetch('/admin/securities/test_endpoint', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                'endpoint': endpoint,
                'api_key': apiKey
            })
        });
        
        const data = await resp.json();
        if (data.success) {
            resultDiv.textContent = '{{ t.msg_endpoint_ok }}';
            resultDiv.style.color = '#28a745';
        } else {
            resultDiv.textContent = '{{ t.msg_endpoint_fail }} (' + data.error + ')';
            resultDiv.style.color = '#c00';
        }
    } catch (err) {
        resultDiv.textContent = '{{ t.msg_endpoint_fail }}';
        resultDiv.style.color = '#c00';
    }
});

// Run on load
toggleApiKey();
</script>
{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <title>{{ t.link_forgot_password }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="login-container">
        <h1>{{ t.link_forgot_password }}</h1>
        <p>{{ t.msg_forgot_password_instruction }}</p>
        <form action="/forgot-password" method="post">
            <label>{{ t.label_email }}</label>
            <input type="email" name="email" required>
            <button type="submit">{{ t.btn_send_reset_link }}</button>
        </form>
        <p><a href="/login">{{ t.nav_login }}</a></p>
    </div>
</body>
</html>

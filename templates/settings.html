<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/css/style.css">
    <title>RateEye Settings</title>
</head>
<body>
    <div class="content">
        <h1>Settings</h1>
        <form action="/settings" method="post">
            <label for="log_lines">Lines to show for log:</label>
            <input type="number" id="log_lines" name="log_lines" value="{{ line_count }}">
            <br><br>
            <button type="submit">Save Settings</button>
            <a href="/">Cancel</a>
        </form>
    </div>
</body>
</html>

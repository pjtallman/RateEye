{% extends "base.html" %}

{% block title %}{{ t.heading_change_your_password }}{% endblock %}

{% block content %}
    <div class="login-container" style="max-width: 400px; margin: 0 auto;">
        <h1>{{ t.heading_change_your_password }}</h1>
        
        {% if error %}
        <div style="background-color: #fee; color: #c00; padding: 10px; border-radius: 4px; margin-bottom: 20px; text-align: center; border: 1px solid #fcc;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/settings/user/change-password" method="post">
            <label>{{ t.label_current_password }}</label>
            <input type="password" name="current_password" required>
            <br><br>
            <label>{{ t.label_new_password }}</label>
            <input type="password" name="new_password" required minlength="8">
            <br><br>
            <label>{{ t.label_confirm_password }}</label>
            <input type="password" name="confirm_password" required minlength="8">
            <br><br>
            <button type="submit">{{ t.btn_update_password }}</button>
        </form>
    </div>
{% endblock %}
